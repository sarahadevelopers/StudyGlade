<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Post a Question - StudyGlade</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="container" style="max-width: 800px; margin-top: 2rem;">
    <div class="card">
      <h2>Post a New Question</h2>
      <form id="postQuestionForm">
        <div class="form-group"><label>Title</label><input type="text" id="title" required></div>
        <div class="form-group"><label>Description</label><textarea id="description" rows="5" required></textarea></div>
        <div class="form-group"><label>Category</label><select id="category"><option>Mathematics</option><option>Science</option><option>Business</option><option>Programming</option></select></div>
        <div class="form-group"><label>Budget ($)</label><input type="number" id="budget" min="3" required></div>
        <div class="form-group"><label>Deadline (days from now)</label><input type="number" id="deadlineDays" min="1"></div>
        <div class="form-group"><label>School</label><input type="text" id="school"></div>
        <div class="form-group"><label>Course</label><input type="text" id="course"></div>
        <button type="submit" class="btn">Post Question & Pay</button>
      </form>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    document.getElementById('postQuestionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const deadline = new Date();
      deadline.setDate(deadline.getDate() + parseInt(document.getElementById('deadlineDays').value || 3));
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        budget: parseFloat(document.getElementById('budget').value),
        deadline: deadline.toISOString(),
        school: document.getElementById('school').value,
        course: document.getElementById('course').value
      };
      try {
        await apiFetch('/questions', { method: 'POST', body: JSON.stringify(data) });
        alert('Question posted successfully!');
        window.location.href = '/docs/student-dashboard.html';
      } catch(err) { alert(err.message); }
    });
  </script>
</body>
</html>
