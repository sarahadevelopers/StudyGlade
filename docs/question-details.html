<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Question Details - StudyGlade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StudyGlade</a>
      <div class="nav-links">
        <span id="walletDisplay"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div id="questionDetails" class="card"></div>

    <!-- Bids Section (visible only for students if question pending) -->
    <div id="bidsSection" class="card" style="display: none;">
      <h3>💼 Bids from Tutors</h3>
      <div id="bidsList"></div>
    </div>

    <div id="commentsSection" class="card">
      <h3>Comments & Clarifications</h3>
      <div id="commentsList"></div>
      <div id="addComment">
        <textarea id="commentText" rows="3" placeholder="Ask a question or provide clarification..."></textarea>
        <button id="postCommentBtn" class="btn">Post Comment</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    if (!questionId) {
      alert('No question specified');
      window.location.href = '/';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ---------- Load Question Details ----------
    async function loadQuestion() {
      try {
        const q = await apiFetch(`/questions/${questionId}`);

        let filesHtml = '';
        if (q.files && q.files.length > 0) {
          filesHtml = '<p><strong>Attached files:</strong></p><ul>';
          q.files.forEach(url => {
            filesHtml += `<li><a href="${escapeHtml(url)}" target="_blank">Download file</a></li>`;
          });
          filesHtml += '</ul>';
        }

        let answerHtml = '';
        if (q.answerFile) {
          answerHtml = `<p><strong>Answer:</strong> <a href="${escapeHtml(q.answerFile)}" target="_blank">Download answer (${escapeHtml(q.answerFileName || 'file')})</a></p>`;
        }

        document.getElementById('questionDetails').innerHTML = `
          <h2>${escapeHtml(q.title)}</h2>
          <p>${escapeHtml(q.description)}</p>
          <p><strong>Budget:</strong> $${q.budget} | <strong>Status:</strong> ${escapeHtml(q.status)}</p>
          <p><strong>Category:</strong> ${escapeHtml(q.category)} | <strong>Deadline:</strong> ${new Date(q.deadline).toLocaleString()}</p>
          <p><strong>School:</strong> ${escapeHtml(q.school || 'Not specified')} | <strong>Course:</strong> ${escapeHtml(q.course || 'Not specified')}</p>
          ${filesHtml}
          ${answerHtml}
        `;

        // Determine whether to show bids section
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'student' && q.status === 'pending') {
          await loadBids();
        } else {
          document.getElementById('bidsSection').style.display = 'none';
        }
      } catch (err) {
        document.getElementById('questionDetails').innerHTML = `<p style="color:red;">Error loading question: ${err.message}</p>`;
      }
    }

    // ---------- Load Bids ----------
    async function loadBids() {
      try {
        const bids = await apiFetch(`/questions/${questionId}/bids`);
        const container = document.getElementById('bidsList');
        if (!bids.length) {
          container.innerHTML = '<p>No bids yet. Check back later.</p>';
        } else {
          container.innerHTML = bids.map(b => `
            <div class="bid-item" style="border:1px solid #ddd; border-radius:8px; padding:1rem; margin-bottom:1rem;">
              <strong>${escapeHtml(b.tutorId.fullName)}</strong><br>
              Bid amount: <strong>$${b.amount}</strong><br>
              Rating: ${b.tutorId.tutorProfile?.rating || 'No rating yet'} ⭐<br>
              Completed questions: ${b.tutorId.tutorProfile?.completedQuestions || 0}<br>
              <button onclick="acceptBid('${b._id}', ${b.amount})" class="btn" style="margin-top:0.5rem;">Accept this bid</button>
            </div>
          `).join('');
        }
        document.getElementById('bidsSection').style.display = 'block';
      } catch (err) {
        console.error('Error loading bids:', err);
        document.getElementById('bidsList').innerHTML = '<p>Error loading bids.</p>';
      }
    }

    // ---------- Accept a Bid ----------
    window.acceptBid = async (bidId, bidAmount) => {
      if (!confirm(`Accept bid of $${bidAmount}? Your wallet will be adjusted (extra charge or refund).`)) return;
      try {
        const result = await apiFetch(`/questions/${questionId}/accept-bid/${bidId}`, { method: 'POST' });
        alert(`Bid accepted! Tutor assigned. New budget: $${result.newBudget}`);
        location.reload();
      } catch (err) {
        alert(err.message);
      }
    };

    // ---------- Load Comments ----------
    async function loadComments() {
      try {
        const comments = await apiFetch(`/comments/question/${questionId}`);
        const container = document.getElementById('commentsList');
        if (comments.length === 0) {
          container.innerHTML = '<p>No comments yet. Be the first to ask a question.</p>';
          return;
        }
        const currentUser = JSON.parse(localStorage.getItem('user'));
        const currentUserId = currentUser ? currentUser.id : null;
        container.innerHTML = comments.map(c => `
          <div class="comment" style="border-left: 3px solid #2563EB; margin-bottom: 1rem; padding-left: 1rem;">
            <strong>${escapeHtml(c.userName)} (${escapeHtml(c.userRole)})</strong> 
            <small>${new Date(c.createdAt).toLocaleString()}</small>
            <p>${escapeHtml(c.text)}</p>
            ${(c.userId === currentUserId || (currentUser && currentUser.role === 'admin')) 
              ? `<button onclick="deleteComment('${c._id}')" class="btn-outline" style="font-size:0.8rem;">Delete</button>` 
              : ''}
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('commentsList').innerHTML = `<p style="color:red;">Error loading comments: ${err.message}</p>`;
      }
    }

    document.getElementById('postCommentBtn').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value;
      if (!text.trim()) return alert('Please enter a comment');
      try {
        await apiFetch('/comments', {
          method: 'POST',
          body: JSON.stringify({ questionId, text })
        });
        document.getElementById('commentText').value = '';
        loadComments();
      } catch (err) {
        alert(err.message);
      }
    });

    async function deleteComment(commentId) {
      if (confirm('Delete this comment?')) {
        try {
          await apiFetch(`/comments/${commentId}`, { method: 'DELETE' });
          loadComments();
        } catch (err) {
          alert(err.message);
        }
      }
    }

    // Initial loads
    loadQuestion();
    loadComments();
  </script>
</body>
</html>
