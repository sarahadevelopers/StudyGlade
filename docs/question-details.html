<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="frame-src 'self' https://res.cloudinary.com; object-src 'self' https://res.cloudinary.com;">
  <title>Question Details | StudyGlade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="question-details.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StudyGlade<i class="fas fa-pen-fancy"></i></a>
      <div class="nav-links">
        <a href="#" id="dashboardLink" class="nav-link">Dashboard</a>
        <div class="user-controls">
          <div class="user-menu" id="userMenu">
            <img src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Avatar" class="user-avatar" id="userAvatar">
            <span class="user-name" id="userName">Loading...</span>
            <i class="fas fa-chevron-down"></i>
            <div class="user-dropdown">
              <a href="#" onclick="logoutUser(); return false;">Logout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="page-main">
    <div class="container">
      <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>

      <div id="questionDetails" class="question-card"></div>

      <!-- Bids Section (student only) -->
      <div id="bidsSection" class="card" style="display: none;">
        <div class="card-header"><h3>💼 Bids from Tutors</h3></div>
        <div id="bidsList"></div>
      </div>

      <!-- Tutor Actions (visible if tutor is assigned) -->
      <div id="tutorActions" class="card" style="display: none;">
        <div class="card-header"><h3>Tutor Actions</h3></div>
        <div class="btn-group">
          <button id="requestFundsBtn" class="btn-primary-sm">💰 Request Additional Funds</button>
          <button id="cancelAssignmentBtn" class="btn-danger-sm">❌ Cancel Assignment (No Penalty)</button>
        </div>
      </div>

      <!-- Student Response to Funds Request -->
      <div id="fundsRequestCard" class="card" style="display: none;">
        <div class="card-header"><h3>📢 Additional Funds Request</h3></div>
        <p id="fundsRequestDetails"></p>
        <div class="btn-group">
          <button id="approveFundsBtn" class="btn-success-sm">✅ Approve & Pay</button>
          <button id="rejectFundsBtn" class="btn-outline-sm">❌ Reject</button>
        </div>
      </div>

      <!-- Comments Section -->
      <div class="card">
        <div class="card-header"><h3>Comments & Clarifications</h3></div>
        <div id="commentsList" class="comments-list"></div>
        <div class="add-comment">
          <textarea id="commentText" rows="3" placeholder="Ask a question or provide clarification..."></textarea>
          <div class="comment-actions">
            <label class="file-label"><i class="fas fa-paperclip"></i> Attach file <input type="file" id="commentFile" accept="image/*,application/pdf,.doc,.docx,.txt" style="display:none;"></label>
            <button id="postCommentBtn" class="btn-primary-sm">Post Comment</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="premium-footer">...</footer> <!-- same footer as other pages -->

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="question-details.js"></script>
  <script>
    function logoutUser() { localStorage.clear(); window.location.href = 'login.html'; }
    document.querySelector('.user-menu')?.addEventListener('click', function() { this.classList.toggle('active'); });
    document.addEventListener('click', function(e) {
      const menu = document.querySelector('.user-menu');
      if (menu && !menu.contains(e.target)) menu.classList.remove('active');
    });
  </script>
</body>
</html>
