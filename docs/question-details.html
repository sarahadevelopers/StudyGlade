<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Question Details - StudyGlade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StudyGlade</a>
      <div class="nav-links">
        <a href="student-dashboard.html" style="margin-right: 1rem;">Dashboard</a>
        <span id="walletDisplay"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div id="questionDetails" class="card"></div>

    <!-- Bids Section (visible only for students if question pending) -->
    <div id="bidsSection" class="card" style="display: none;">
      <h3>💼 Bids from Tutors</h3>
      <div id="bidsList"></div>
    </div>

    <div id="commentsSection" class="card">
      <h3>Comments & Clarifications</h3>
      <div id="commentsList"></div>
      <div id="addComment">
        <textarea id="commentText" rows="3" placeholder="Ask a question or provide clarification..."></textarea>
        <input type="file" id="commentFile" accept="image/*,application/pdf,.doc,.docx,.txt"><br>
        <button id="postCommentBtn" class="btn" style="margin-top:0.5rem;">Post Comment (with optional file)</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    if (!questionId) {
      alert('No question specified');
      window.location.href = '/';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ---------- Load Question Details ----------
    async function loadQuestion() {
      try {
        const q = await apiFetch(`/questions/${questionId}`);

        let filesHtml = '';
        if (q.files && q.files.length > 0) {
          filesHtml = '<p><strong>Attached files:</strong></p><ul>';
          q.files.forEach(url => {
            filesHtml += `<li><a href="${escapeHtml(url)}" target="_blank">Download file</a></li>`;
          });
          filesHtml += '</ul>';
        }

        let answerHtml = '';
        if (q.answerFile) {
          answerHtml = `<p><strong>Answer:</strong> <a href="${escapeHtml(q.answerFile)}" target="_blank">Download answer (${escapeHtml(q.answerFileName || 'file')})</a></p>`;
        }

        document.getElementById('questionDetails').innerHTML = `
          <h2>${escapeHtml(q.title)}</h2>
          <p>${escapeHtml(q.description)}</p>
          <p><strong>Budget:</strong> $${q.budget} | <strong>Status:</strong> ${escapeHtml(q.status)}</p>
          <p><strong>Category:</strong> ${escapeHtml(q.category)} | <strong>Deadline:</strong> ${new Date(q.deadline).toLocaleString()}</p>
          <p><strong>School:</strong> ${escapeHtml(q.school || 'Not specified')} | <strong>Course:</strong> ${escapeHtml(q.course || 'Not specified')}</p>
          ${filesHtml}
          ${answerHtml}
        `;

        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'student' && q.status === 'pending') {
          await loadBids();
        } else {
          document.getElementById('bidsSection').style.display = 'none';
        }
      } catch (err) {
        document.getElementById('questionDetails').innerHTML = `<p style="color:red;">Error loading question: ${err.message}</p>`;
      }
    }

    // ---------- Load Bids ----------
    async function loadBids() {
      try {
        const bids = await apiFetch(`/questions/${questionId}/bids`);
        const container = document.getElementById('bidsList');
        if (!bids.length) {
          container.innerHTML = '<p>No bids yet. Check back later.</p>';
        } else {
          container.innerHTML = bids.map(b => `
            <div class="bid-item" style="position:relative; border:1px solid #ddd; border-radius:8px; padding:1rem; margin-bottom:1rem;">
              <strong>${escapeHtml(b.tutorId.fullName)}</strong><br>
              Bid amount: <strong>$${b.amount}</strong><br>
              <div class="tutor-tooltip" style="display:none; position:absolute; background:var(--white); border:1px solid #ccc; padding:0.5rem; border-radius:0.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.1); z-index:10; max-width:200px;">
                Rating: ${b.tutorId.tutorProfile?.rating || 'No rating yet'} ⭐<br>
                Completed: ${b.tutorId.tutorProfile?.completedQuestions || 0}<br>
                Subjects: ${b.tutorId.tutorProfile?.subjects?.join(', ') || 'Not specified'}
              </div>
              <button onclick="acceptBid('${b._id}', ${b.amount})" class="btn" style="margin-top:0.5rem;">Accept this bid</button>
            </div>
          `).join('');
          attachTooltipEvents();
        }
        document.getElementById('bidsSection').style.display = 'block';
      } catch (err) {
        console.error('Error loading bids:', err);
        document.getElementById('bidsList').innerHTML = '<p>Error loading bids.</p>';
      }
    }

    function attachTooltipEvents() {
      document.querySelectorAll('.bid-item').forEach(item => {
        const tooltip = item.querySelector('.tutor-tooltip');
        if (!tooltip) return;
        item.addEventListener('mouseenter', () => tooltip.style.display = 'block');
        item.addEventListener('mouseleave', () => tooltip.style.display = 'none');
      });
    }

    // ---------- Enhanced Accept a Bid ----------
    window.acceptBid = async (bidId, bidAmount) => {
      if (!confirm(`Accept bid of $${bidAmount}? Your wallet will be adjusted (extra charge or refund).`)) return;

      // Optional: disable button to prevent double-click (not implemented for brevity)
      try {
        const result = await apiFetch(`/questions/${questionId}/accept-bid/${bidId}`, { method: 'POST' });
        showToast(`Bid accepted! Tutor assigned. New budget: $${result.newBudget}`, 'success');
        // Reload the page – bids section will disappear because question is now assigned
        location.reload();
      } catch (err) {
        // Parse insufficient balance error
        const errorMsg = err.message;
        if (errorMsg.includes('Insufficient balance')) {
          // Extract the amount needed from the error message
          const match = errorMsg.match(/Need \$([\d.]+) more/);
          const neededAmount = match ? match[1] : 'the required amount';
          const userConfirmed = confirm(`⚠️ Insufficient wallet balance. You need to add $${neededAmount} to your wallet before accepting this bid.\n\nClick OK to go to your dashboard and add funds.`);
          if (userConfirmed) {
            window.location.href = 'student-dashboard.html?action=addFunds';
          }
        } else {
          showToast(errorMsg, 'error');
        }
      }
    };

    // ---------- Load Comments (with file attachment display) ----------
    async function loadComments() {
      try {
        const comments = await apiFetch(`/comments/question/${questionId}`);
        const container = document.getElementById('commentsList');
        if (comments.length === 0) {
          container.innerHTML = '<p>No comments yet. Be the first to ask a question.</p>';
          return;
        }
        const currentUser = JSON.parse(localStorage.getItem('user'));
        const currentUserId = currentUser ? currentUser.id : null;
        container.innerHTML = comments.map(c => `
          <div class="comment" style="border-left: 3px solid #2563EB; margin-bottom: 1rem; padding-left: 1rem;">
            <strong>${escapeHtml(c.userName)} (${escapeHtml(c.userRole)})</strong> 
            <small>${new Date(c.createdAt).toLocaleString()}</small>
            <p>${escapeHtml(c.text)}</p>
            ${c.fileUrl ? `<p><a href="${escapeHtml(c.fileUrl)}" target="_blank">📎 Download attached file</a></p>` : ''}
            ${(c.userId === currentUserId || (currentUser && currentUser.role === 'admin')) 
              ? `<button onclick="deleteComment('${c._id}')" class="btn-outline" style="font-size:0.8rem;">Delete</button>` 
              : ''}
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('commentsList').innerHTML = `<p style="color:red;">Error loading comments: ${err.message}</p>`;
      }
    }

    // ---------- Post Comment with optional file ----------
    document.getElementById('postCommentBtn').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value;
      const fileInput = document.getElementById('commentFile');
      const file = fileInput.files[0];
      if (!text.trim() && !file) {
        alert('Please enter a comment or attach a file.');
        return;
      }
      const formData = new FormData();
      formData.append('questionId', questionId);
      if (text.trim()) formData.append('text', text);
      if (file) formData.append('file', file);
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${window.API_BASE}/comments`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('commentText').value = '';
          fileInput.value = '';
          loadComments();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert(err.message);
      }
    });

    async function deleteComment(commentId) {
      if (confirm('Delete this comment?')) {
        try {
          await apiFetch(`/comments/${commentId}`, { method: 'DELETE' });
          loadComments();
        } catch (err) {
          alert(err.message);
        }
      }
    }

    // Initial loads
    loadQuestion();
    loadComments();
  </script>
</body>
</html>
