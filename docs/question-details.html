<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Question Details - StudyGlade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StudyGlade</a>
      <div class="nav-links">
        <a href="#" id="dashboardLink" style="margin-right: 1rem;">Dashboard</a>
        <span id="walletDisplay"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div id="questionDetails" class="card"></div>

    <!-- Tutor Actions (visible only if tutor is assigned) -->
    <div id="tutorActions" class="card" style="display: none;">
      <h3>Tutor Actions</h3>
      <button id="requestFundsBtn" class="btn">💰 Request Additional Funds</button>
      <button id="cancelAssignmentBtn" class="btn-outline" style="background:#ef4444; color:white;">❌ Cancel Assignment (No Penalty)</button>
    </div>

    <!-- Student Response to Funds Request -->
    <div id="fundsRequestCard" class="card" style="display: none;">
      <h3>📢 Additional Funds Request</h3>
      <p id="fundsRequestDetails"></p>
      <button id="approveFundsBtn" class="btn">✅ Approve & Pay</button>
      <button id="rejectFundsBtn" class="btn-outline">❌ Reject</button>
    </div>

    <!-- Bids Section (student only) -->
    <div id="bidsSection" class="card" style="display: none;">
      <h3>💼 Bids from Tutors</h3>
      <div id="bidsList"></div>
    </div>

    <!-- Comments Section -->
    <div id="commentsSection" class="card">
      <h3>Comments & Clarifications</h3>
      <div id="commentsList"></div>
      <div id="addComment">
        <textarea id="commentText" rows="3" placeholder="Ask a question or provide clarification..."></textarea>
        <input type="file" id="commentFile" accept="image/*,application/pdf,.doc,.docx,.txt"><br>
        <button id="postCommentBtn" class="btn" style="margin-top:0.5rem;">Post Comment (with optional file)</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    let currentUser = null;
    let currentQuestion = null;

    if (!questionId) { alert('No question specified'); window.location.href = '/'; }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ---------- Load everything ----------
    async function loadPage() {
      currentUser = JSON.parse(localStorage.getItem('user'));
      // Set dashboard link based on role
      const dashboardLink = document.getElementById('dashboardLink');
      if (currentUser.role === 'student') dashboardLink.href = 'student-dashboard.html';
      else if (currentUser.role === 'tutor') dashboardLink.href = 'tutor-dashboard.html';
      else dashboardLink.href = 'admin-dashboard.html';

      await loadQuestion();
      if (currentUser.role === 'student' && currentQuestion.status === 'pending') await loadBids();
      await loadComments();
      checkSpecialActions();
    }

    async function loadQuestion() {
      try {
        currentQuestion = await apiFetch(`/questions/${questionId}`);
        let filesHtml = '', answerHtml = '';
        if (currentQuestion.files?.length) {
          filesHtml = '<p><strong>Attached files:</strong></p><ul>';
          currentQuestion.files.forEach(url => filesHtml += `<li><a href="${escapeHtml(url)}" target="_blank">Download file</a></li>`);
          filesHtml += '</ul>';
        }
        if (currentQuestion.answerFile) {
          answerHtml = `<p><strong>Answer:</strong> <a href="${escapeHtml(currentQuestion.answerFile)}" target="_blank">Download answer (${escapeHtml(currentQuestion.answerFileName || 'file')})</a></p>`;
        }
        document.getElementById('questionDetails').innerHTML = `
          <h2>${escapeHtml(currentQuestion.title)}</h2>
          <p>${escapeHtml(currentQuestion.description)}</p>
          <p><strong>Budget:</strong> $${currentQuestion.budget} | <strong>Status:</strong> ${escapeHtml(currentQuestion.status)}</p>
          <p><strong>Category:</strong> ${escapeHtml(currentQuestion.category)} | <strong>Deadline:</strong> ${new Date(currentQuestion.deadline).toLocaleString()}</p>
          <p><strong>School:</strong> ${escapeHtml(currentQuestion.school || 'Not specified')} | <strong>Course:</strong> ${escapeHtml(currentQuestion.course || 'Not specified')}</p>
          ${filesHtml} ${answerHtml}
        `;
      } catch (err) {
        document.getElementById('questionDetails').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    }

    async function loadBids() {
      try {
        const bids = await apiFetch(`/questions/${questionId}/bids`);
        const container = document.getElementById('bidsList');
        if (!bids.length) container.innerHTML = '<p>No bids yet.</p>';
        else {
          container.innerHTML = bids.map(b => `
            <div class="bid-item" style="border:1px solid #ddd; border-radius:8px; padding:1rem; margin-bottom:1rem;">
              <strong>${escapeHtml(b.tutorId.fullName)}</strong><br>
              Bid amount: <strong>$${b.amount}</strong><br>
              <button onclick="acceptBid('${b._id}', ${b.amount}, event)" class="btn">Accept this bid</button>
            </div>
          `).join('');
        }
        document.getElementById('bidsSection').style.display = 'block';
      } catch (err) { console.error(err); }
    }

    window.acceptBid = async (bidId, bidAmount, event) => {
      const btn = event.target;
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Accepting...'; }
      if (!confirm(`Accept bid $${bidAmount}? Your wallet will be adjusted.`)) {
        if (btn) { btn.disabled = false; btn.innerHTML = 'Accept this bid'; }
        return;
      }
      try {
        const result = await apiFetch(`/questions/${questionId}/accept-bid/${bidId}`, { method: 'POST' });
        showToast(`Bid accepted! New budget $${result.newBudget}`, 'success');
        location.reload();
      } catch (err) {
        showToast(err.message, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = 'Accept this bid'; }
      }
    };

    // ---------- Tutor Actions (Additional Funds & Cancel) ----------
    function checkSpecialActions() {
      const tutorActionsDiv = document.getElementById('tutorActions');
      const fundsRequestDiv = document.getElementById('fundsRequestCard');
      if (currentUser.role === 'tutor' && currentQuestion.tutorId === currentUser.id && currentQuestion.status === 'assigned') {
        tutorActionsDiv.style.display = 'block';
        document.getElementById('requestFundsBtn').onclick = () => requestAdditionalFunds();
        document.getElementById('cancelAssignmentBtn').onclick = () => cancelAssignment();
      } else {
        tutorActionsDiv.style.display = 'none';
      }

      // Student: show pending funds request
      if (currentUser.role === 'student' && currentQuestion.additionalFundsRequest && currentQuestion.additionalFundsRequest.status === 'pending') {
        const req = currentQuestion.additionalFundsRequest;
        document.getElementById('fundsRequestDetails').innerHTML = `Tutor requests <strong>$${req.amount}</strong> extra.<br>Reason: ${escapeHtml(req.reason)}`;
        fundsRequestDiv.style.display = 'block';
        document.getElementById('approveFundsBtn').onclick = () => respondToFundsRequest(true);
        document.getElementById('rejectFundsBtn').onclick = () => respondToFundsRequest(false);
      } else {
        fundsRequestDiv.style.display = 'none';
      }
    }

    async function requestAdditionalFunds() {
      const amount = prompt('Additional amount requested ($):');
      if (!amount || isNaN(amount) || parseFloat(amount) <= 0) return showToast('Invalid amount', 'error');
      const reason = prompt('Reason for additional funds:');
      if (!reason) return showToast('Reason required', 'error');
      try {
        await apiFetch(`/questions/${questionId}/request-additional-funds`, {
          method: 'POST',
          body: JSON.stringify({ amount: parseFloat(amount), reason })
        });
        showToast('Request sent to student', 'success');
        location.reload();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function cancelAssignment() {
      const reason = prompt('Why are you cancelling? (No penalty)');
      if (!reason) return;
      if (!confirm('Cancel this assignment? You will not be penalized.')) return;
      try {
        await apiFetch(`/questions/${questionId}/cancel-assignment`, {
          method: 'POST',
          body: JSON.stringify({ reason })
        });
        showToast('Assignment cancelled', 'success');
        location.reload();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function respondToFundsRequest(accept) {
      try {
        await apiFetch(`/questions/${questionId}/respond-funds-request`, {
          method: 'POST',
          body: JSON.stringify({ accept })
        });
        showToast(accept ? 'Additional funds added' : 'Request rejected', 'success');
        location.reload();
      } catch (err) { showToast(err.message, 'error'); }
    }

    // ---------- Comments (same as before) ----------
    async function loadComments() {
      try {
        const comments = await apiFetch(`/comments/question/${questionId}`);
        const container = document.getElementById('commentsList');
        if (!comments.length) { container.innerHTML = '<p>No comments yet.</p>'; return; }
        const currentUserId = currentUser.id;
        container.innerHTML = comments.map(c => `
          <div style="border-left:3px solid #2563EB; margin-bottom:1rem; padding-left:1rem;">
            <strong>${escapeHtml(c.userName)} (${escapeHtml(c.userRole)})</strong> <small>${new Date(c.createdAt).toLocaleString()}</small>
            <p>${escapeHtml(c.text)}</p>
            ${c.fileUrl ? `<p><a href="${escapeHtml(c.fileUrl)}" target="_blank">📎 Download attached file</a></p>` : ''}
            ${(c.userId === currentUserId || currentUser.role === 'admin') ? `<button onclick="deleteComment('${c._id}')" class="btn-outline" style="font-size:0.8rem;">Delete</button>` : ''}
          </div>
        `).join('');
      } catch (err) { console.error(err); }
    }

    document.getElementById('postCommentBtn').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value;
      const file = document.getElementById('commentFile').files[0];
      if (!text.trim() && !file) return alert('Enter a comment or attach a file.');
      const formData = new FormData();
      formData.append('questionId', questionId);
      if (text.trim()) formData.append('text', text);
      if (file) formData.append('file', file);
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${window.API_BASE}/comments`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        if (res.ok) {
          document.getElementById('commentText').value = '';
          document.getElementById('commentFile').value = '';
          loadComments();
        } else { const data = await res.json(); alert(data.error); }
      } catch (err) { alert(err.message); }
    });

    window.deleteComment = async (commentId) => {
      if (confirm('Delete this comment?')) {
        try { await apiFetch(`/comments/${commentId}`, { method: 'DELETE' }); loadComments(); } 
        catch (err) { alert(err.message); }
      }
    };

    loadPage();
  </script>
</body>
</html>
