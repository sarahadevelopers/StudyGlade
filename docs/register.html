<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Register - StudyGlade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="max-width: 500px; margin-top: 2rem;">
    <div class="card">
      <h2>Create Account</h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
          <small style="display: block; margin-top: 0.25rem; color: #6c757d;">At least 6 characters</small>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="tutor">Tutor</option>
          </select>
        </div>
        <button type="submit" class="btn">Sign Up</button>
      </form>
      <p style="margin-top: 1rem;">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    // Additional client-side validation for password length
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      const password = document.getElementById('password').value;
      if (password.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters long.');
        return false;
      }
    });
  </script>
</body>
</html>
