<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset Password | StudyGlade</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="images/studyglade-official-favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome for eye icons & toast icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== OFFICIAL COLOR VARIABLES ========== */
    :root {
      --navy: #061B49;
      --deep-blue: #0B2E75;
      --brand-blue: #005BFF;
      --royal-blue: #2563EB;
      --sky-blue: #38BDF8;
      --ice-blue: #EFF6FF;
      --pale-blue: #DBEAFE;
      --white: #FFFFFF;
      --text-navy: #0F172A;
      --slate: #64748B;
      --border-grey: #E2E8F0;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --shadow-sm: 0 4px 10px -2px rgba(0,0,0,0.05);
      --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.1);
      --grad-primary: linear-gradient(135deg, #005BFF 0%, #2563EB 60%, #38BDF8 100%);
      --grad-nav: linear-gradient(135deg, #061B49 0%, #0B2E75 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--grad-nav);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
    }
    .reset-card {
      max-width: 460px;
      width: 100%;
      background: var(--white);
      border-radius: 32px;
      box-shadow: var(--shadow-md);
      padding: 2rem;
      transition: all 0.3s ease;
      border: 1px solid var(--border-grey);
      animation: fadeInUp 0.6s ease-out;
    }
    .reset-card:hover {
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: var(--slate);
      margin-bottom: 2rem;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border-grey);
      padding-bottom: 0.75rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    label {
      position: absolute;
      top: -0.6rem;
      left: 1rem;
      background: var(--white);
      padding: 0 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand-blue);
      letter-spacing: 0.02em;
      transition: all 0.2s;
      z-index: 2;
    }
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .password-wrapper input {
      width: 100%;
      padding: 1rem 3rem 1rem 1rem;
      border: 1.5px solid var(--border-grey);
      border-radius: 60px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: var(--white);
      outline: none;
    }
    .password-wrapper input:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0,91,255,0.15);
      transform: translateY(-1px);
    }
    .toggle-password {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--slate);
      font-size: 1.1rem;
      transition: color 0.2s;
      z-index: 3;
    }
    .toggle-password:hover {
      color: var(--brand-blue);
    }
    .btn-primary {
      width: 100%;
      background: var(--grad-primary);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,91,255,0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-primary:hover::after {
      left: 100%;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,91,255,0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .back-link a {
      color: var(--brand-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link a:hover {
      text-decoration: underline;
      color: var(--royal-blue);
    }
    /* Premium toast notification */
    .toast-notification {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(150%);
      background: var(--text-navy);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast-notification.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast-notification.success {
      background: var(--success);
      color: white;
    }
    .toast-notification.error {
      background: var(--error);
      color: white;
    }
    .toast-notification i {
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div class="reset-card">
  <h2>Reset your password</h2>
  <div class="sub">Enter and confirm your new password below.</div>
  <form id="resetPasswordForm">
    <div class="form-group">
      <label>New Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" required minlength="6">
        <i class="fas fa-eye toggle-password" data-target="password"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" required minlength="6">
        <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
      </div>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
  </form>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script src="api.js"></script>
<script>
  // Custom toast notification (replaces ugly alert)
  function showToast(message, type = 'info') {
    const existingToast = document.querySelector('.toast-notification');
    if (existingToast) existingToast.remove();

    const toast = document.createElement('div');
    toast.className = `toast-notification ${type}`;
    let icon = '';
    if (type === 'success') icon = '<i class="fas fa-check-circle"></i>';
    else if (type === 'error') icon = '<i class="fas fa-exclamation-circle"></i>';
    else icon = '<i class="fas fa-info-circle"></i>';
    toast.innerHTML = `${icon} ${escapeHtml(message)}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  // Password visibility toggle for both fields
  document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function () {
      const targetId = this.getAttribute('data-target');
      const input = document.getElementById(targetId);
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.classList.toggle('fa-eye-slash');
    });
  });

  // Get token from URL query parameter
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  if (!token) {
    showToast('Invalid or missing reset token. Please request a new password reset.', 'error');
    setTimeout(() => { window.location.href = 'forgot-password.html'; }, 2500);
  }

  const form = document.getElementById('resetPasswordForm');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
      showToast('Passwords do not match.', 'error');
      return;
    }
    if (password.length < 6) {
      showToast('Password must be at least 6 characters.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Resetting...';
    try {
      await apiFetch('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({ token, newPassword: password })
      });
      showToast('Password has been reset successfully. Please log in with your new password.', 'success');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
    } catch (err) {
      showToast(err.message || 'Something went wrong. Please try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Reset Password';
    }
  });
</script>
</body>
</html>
