<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - StudyGlade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="max-width: 500px; margin-top: 4rem;">
    <div class="card">
      <h2>Reset Your Password</h2>
      <p>Enter your new password below.</p>
      <form id="resetPasswordForm">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" required minlength="6">
        </div>
        <button type="submit" class="btn">Reset Password</button>
      </form>
      <p style="margin-top: 1rem;">
        <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    // Get token from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (!token) {
      alert('Invalid or missing reset token. Please request a new password reset.');
      window.location.href = 'forgot-password.html';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }
      if (password.length < 6) {
        alert('Password must be at least 6 characters.');
        return;
      }
      const button = e.target.querySelector('button');
      button.disabled = true;
      button.textContent = 'Resetting...';
      try {
        await apiFetch('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, newPassword: password })
        });
        alert('Password has been reset. Please log in with your new password.');
        window.location.href = 'login.html';
      } catch (err) {
        alert(err.message);
        button.disabled = false;
        button.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
