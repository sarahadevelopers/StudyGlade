<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Upload Document - StudyGlade</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
  <div class="container" style="max-width: 600px; margin-top: 2rem;">
    <div class="card">
      <h2>Upload Study Material</h2>
      <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group"><label>Title</label><input type="text" name="title" required></div>
        <div class="form-group"><label>Description</label><textarea name="description"></textarea></div>
        <div class="form-group"><label>Subject</label><input type="text" name="subject" required></div>
        <div class="form-group"><label>Level</label><select name="level"><option>High School</option><option>College</option><option>Masters</option><option>PhD</option></select></div>
        <div class="form-group"><label>Type</label><select name="type"><option>Notes</option><option>Assignment</option><option>Exam Prep</option><option>Guide</option></select></div>
        <div class="form-group"><label>Price ($)</label><input type="number" name="price" min="0" step="0.5" required></div>
        <div class="form-group"><label>File (PDF, DOC, etc.)</label><input type="file" name="file" required></div>
        <button type="submit" class="btn">Upload</button>
      </form>
    </div>
  </div>
  <script src="/public/js/api.js"></script>
  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const token = localStorage.getItem('token');
      const res = await fetch('/api/documents/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok) alert('Upload successful! Waiting for admin approval.');
      else alert(data.error);
    });
  </script>
</body>
</html>
