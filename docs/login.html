<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StudyGlade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0a0c10;
    }
    .sub {
      color: #5b6e8c;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 60px;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .btn-primary {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }
    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }
    .links {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .links a {
      color: #3b82f6;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    hr {
      margin: 1.5rem 0;
      border: 0;
      height: 1px;
      background: #eef2f6;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #dc2626; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }
  </style>
</head>
<body>
<div class="login-card">
  <h2>Welcome back</h2>
  <div class="sub">Sign in to continue to StudyGlade</div>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn-primary" id="loginBtn">Log in</button>
    <div id="errorMsg" class="error"></div>
  </form>
  <div class="links">
    <a href="forgot-password.html">Forgot password?</a> &nbsp;|&nbsp;
    <a href="register.html">Create account</a>
  </div>
  <hr>
  <div style="font-size:0.7rem; text-align:center; color:#6c7a91;">
    By logging in, you agree to our <a href="/terms">Terms</a>.
  </div>
</div>
<script src="api.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const res = await apiFetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (res.user) {
        localStorage.setItem('user', JSON.stringify(res.user));
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('returnTo');
        if (returnTo) {
          window.location.href = returnTo;
        } else {
          window.location.href = res.user.role === 'student' ? 'student-dashboard.html' : 'tutor-dashboard.html';
        }
      } else {
        throw new Error('Invalid response');
      }
    } catch (err) {
      document.getElementById('errorMsg').innerText = err.message || 'Login failed. Check credentials.';
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Log in';
    }
  });
</script>
</body>
</html>
