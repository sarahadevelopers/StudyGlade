<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login - StudyGlade</title><link rel="stylesheet" href="/public/css/style.css"></head>
<body>
  <div class="container" style="max-width: 400px; margin-top: 4rem;">
    <div class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit" class="btn">Login</button>
      </form>
      <p style="margin-top: 1rem;">Don't have an account? <a href="/docs/register.html">Sign up</a></p>
    </div>
  </div>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js"></script>
</body>
</html>
