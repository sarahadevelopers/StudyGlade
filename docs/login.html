<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login | StudyGlade</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="images/studyglade-official-favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome for eye icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== OFFICIAL COLOR VARIABLES (same as register) ========== */
    :root {
      --navy: #061B49;
      --deep-blue: #0B2E75;
      --brand-blue: #005BFF;
      --royal-blue: #2563EB;
      --sky-blue: #38BDF8;
      --ice-blue: #EFF6FF;
      --pale-blue: #DBEAFE;
      --white: #FFFFFF;
      --text-navy: #0F172A;
      --slate: #64748B;
      --border-grey: #E2E8F0;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --shadow-sm: 0 4px 10px -2px rgba(0,0,0,0.05);
      --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.1);
      --grad-primary: linear-gradient(135deg, #005BFF 0%, #2563EB 60%, #38BDF8 100%);
      --grad-nav: linear-gradient(135deg, #061B49 0%, #0B2E75 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--grad-nav);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
    }
    .login-card {
      max-width: 460px;
      width: 100%;
      background: var(--white);
      border-radius: 32px;
      box-shadow: var(--shadow-md);
      padding: 2rem;
      transition: all 0.3s ease;
      border: 1px solid var(--border-grey);
      animation: fadeInUp 0.6s ease-out;
    }
    .login-card:hover {
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      font-size: 2rem;
      font-weight: 700;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
    }
    .sub {
      color: var(--slate);
      margin-bottom: 2rem;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border-grey);
      padding-bottom: 0.75rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    label {
      position: absolute;
      top: -0.6rem;
      left: 1rem;
      background: var(--white);
      padding: 0 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand-blue);
      letter-spacing: 0.02em;
      transition: all 0.2s;
      z-index: 2;
    }
    input {
      width: 100%;
      padding: 1rem 1rem;
      border: 1.5px solid var(--border-grey);
      border-radius: 60px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: var(--white);
      outline: none;
    }
    input:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0,91,255,0.15);
      transform: translateY(-1px);
    }
    /* Password field with eye icon */
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .password-wrapper input {
      padding-right: 3rem;
    }
    .toggle-password {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--slate);
      font-size: 1.1rem;
      transition: color 0.2s;
      z-index: 3;
    }
    .toggle-password:hover {
      color: var(--brand-blue);
    }
    .btn-primary {
      width: 100%;
      background: var(--grad-primary);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,91,255,0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-primary:hover::after {
      left: 100%;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,91,255,0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .links a {
      color: var(--brand-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover {
      text-decoration: underline;
      color: var(--royal-blue);
    }
    hr {
      margin: 1.5rem 0;
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--border-grey), transparent);
    }
    .error {
      color: var(--error);
      font-size: 0.8rem;
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
    }
    .terms-note {
      font-size: 0.7rem;
      text-align: center;
      color: var(--slate);
    }
    .terms-note a {
      color: var(--brand-blue);
      text-decoration: none;
    }
    .terms-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="login-card">
  <h2>Welcome back</h2>
  <div class="sub">Sign in to continue to StudyGlade</div>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" required>
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
      </div>
    </div>
    <button type="submit" class="btn-primary" id="loginBtn">Log in</button>
    <div id="errorMsg" class="error"></div>
  </form>
  <div class="links">
    <a href="forgot-password.html">Forgot password?</a> &nbsp;|&nbsp;
    <a href="register.html">Create account</a>
  </div>
  <hr>
  <div class="terms-note">
    By logging in, you agree to our <a href="terms.html">Terms</a>.
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="api.js"></script>
<script>
  // Password visibility toggle
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  togglePassword.addEventListener('click', function () {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
  });

  const form = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    errorMsg.innerText = '';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (data.user) {
        localStorage.setItem('user', JSON.stringify(data.user));
        if (data.accessToken) {
          localStorage.setItem('accessToken', data.accessToken);
        }
        if (window.initSocket) window.initSocket();

        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('returnTo');
        if (returnTo) {
          window.location.href = returnTo;
        } else {
          if (data.user.role === 'student') window.location.href = 'student-dashboard.html';
          else if (data.user.role === 'tutor') window.location.href = 'tutor-dashboard.html';
          else if (data.user.role === 'admin') window.location.href = 'admin-dashboard.html';
          else window.location.href = 'index.html';
        }
      } else {
        throw new Error('Invalid response');
      }
    } catch (err) {
      errorMsg.innerText = err.message || 'Login failed. Check credentials.';
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Log in';
    }
  });
</script>
</body>
</html>
