<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Answer Details - StudyGlade</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="images/studyglade-official-favicon.jpg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Additional styles for answer file list */
    .answer-files-list {
      list-style: none;
      padding: 0;
    }
    .answer-files-list li {
      margin: 0.5rem 0;
      padding: 0.5rem 0.75rem;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .answer-files-list li a {
      color: #005BFF;
      text-decoration: none;
      font-weight: 500;
    }
    .answer-files-list li a:hover {
      text-decoration: underline;
    }
    .file-icon {
      font-size: 1.2rem;
      color: #64748B;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StudyGlade</a>
      <div class="nav-links">
        <a href="student-dashboard.html" style="margin-right: 1rem;">Dashboard</a>
        <span id="walletDisplay"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div id="answerDetails" class="card"></div>
    <div id="answerFileSection" class="card" style="display:none;"></div>
    <div id="commentsSection" class="card">
      <h3>💬 Discussion with Tutor</h3>
      <div id="commentsList"></div>
      <div id="addComment">
        <textarea id="commentText" rows="3" placeholder="Ask a follow-up question or provide clarification..."></textarea>
        <input type="file" id="commentFile" accept="image/*,application/pdf,.doc,.docx,.txt"><br>
        <button id="postCommentBtn" class="btn" style="margin-top:0.5rem;">Post Comment (with optional file)</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    if (!questionId) {
      alert('No question specified');
      window.location.href = '/';
    }

    let currentUser = null;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function formatMoney(amount) {
      return `$${parseFloat(amount).toFixed(2)}`;
    }

    function formatDate(date) {
      if (!date) return 'Not set';
      return new Date(date).toLocaleString();
    }

    async function loadAnswerDetails() {
      try {
        const q = await apiFetch(`/questions/${questionId}`);
        currentUser = JSON.parse(localStorage.getItem('user'));

        // ---- Question metadata ----
        let displaySubject = q.subject || 'General';
        let displaySchool = q.school || 'Not specified';
        let displayCourse = q.course || 'Not specified';
        let displayCategory = q.category || '—';
        let displayDeadline = q.deadline ? formatDate(q.deadline) : 'Not set';

        const titleHtml = `<h2>${escapeHtml(q.title)}</h2>`;
        const descHtml = `<p>${escapeHtml(q.description)}</p>`;
        const metaHtml = `
          <p><strong>Budget:</strong> ${formatMoney(q.budget)} |
          <strong>Status:</strong> ${escapeHtml(q.status)}</p>
          <p><strong>Category:</strong> ${escapeHtml(displayCategory)} |
          <strong>Deadline:</strong> ${escapeHtml(displayDeadline)}</p>
          <p><strong>Subject:</strong> ${escapeHtml(displaySubject)}</p>
          <p><strong>School:</strong> ${escapeHtml(displaySchool)} |
          <strong>Course:</strong> ${escapeHtml(displayCourse)}</p>
        `;

        document.getElementById('answerDetails').innerHTML = titleHtml + descHtml + metaHtml;

        // ---- Answer file(s) display ----
        const answerDiv = document.getElementById('answerFileSection');
        let content = '';

        // Check for multiple files first (new system)
        if (q.answerFiles && q.answerFiles.length > 0) {
          content = `<h3>📄 Answer Files</h3><ul class="answer-files-list">`;
          q.answerFiles.forEach((url, index) => {
            const fileName = q.answerFileNames && q.answerFileNames[index] 
              ? q.answerFileNames[index] 
              : `file-${index + 1}`;
            // Determine file icon based on extension
            let icon = 'fa-file';
            if (fileName.match(/\.(pdf)$/i)) icon = 'fa-file-pdf';
            else if (fileName.match(/\.(doc|docx)$/i)) icon = 'fa-file-word';
            else if (fileName.match(/\.(xls|xlsx)$/i)) icon = 'fa-file-excel';
            else if (fileName.match(/\.(jpg|jpeg|png|gif|webp)$/i)) icon = 'fa-file-image';
            else if (fileName.match(/\.(zip|rar)$/i)) icon = 'fa-file-archive';
            content += `
              <li>
                <i class="fas ${icon} file-icon"></i>
                <a href="${escapeHtml(url)}" target="_blank">${escapeHtml(fileName)}</a>
                <span style="margin-left:auto; font-size:0.7rem; color:#94a3b8;">
                  <i class="fas fa-download"></i> Download
                </span>
              </li>
            `;
          });
          content += `</ul>`;
          answerDiv.innerHTML = content;
          answerDiv.style.display = 'block';
        } 
        // Fallback to legacy single file
        else if (q.answerFile) {
          let fileUrl = q.answerFileSigned || q.answerFile;
          let fileName = q.answerFileName || 'answer-file';
          let fileIcon = 'fa-file';
          if (fileName.match(/\.(pdf)$/i)) fileIcon = 'fa-file-pdf';
          else if (fileName.match(/\.(doc|docx)$/i)) fileIcon = 'fa-file-word';
          else if (fileName.match(/\.(jpg|jpeg|png|gif|webp)$/i)) fileIcon = 'fa-file-image';

          content = `<h3>📄 Answer</h3><ul class="answer-files-list"><li>`;
          content += `<i class="fas ${fileIcon} file-icon"></i>`;
          content += `<a href="${escapeHtml(fileUrl)}" target="_blank">${escapeHtml(fileName)}</a>`;
          content += `<span style="margin-left:auto; font-size:0.7rem; color:#94a3b8;"><i class="fas fa-download"></i> Download</span>`;
          content += `</li></ul>`;
          answerDiv.innerHTML = content;
          answerDiv.style.display = 'block';
        } 
        else {
          answerDiv.style.display = 'none';
        }

        // Load comments
        await loadComments();

      } catch (err) {
        document.getElementById('answerDetails').innerHTML = `<p style="color:red;">Error loading answer: ${err.message}</p>`;
      }
    }

    async function loadComments() {
      try {
        const comments = await apiFetch(`/comments/question/${questionId}`);
        const container = document.getElementById('commentsList');
        if (comments.length === 0) {
          container.innerHTML = '<p>No discussion yet. Start a conversation with your tutor.</p>';
          return;
        }
        const currentUserId = currentUser ? currentUser.id : null;
        container.innerHTML = comments.map(c => `
          <div class="comment" style="border-left: 3px solid #2563EB; margin-bottom: 1rem; padding-left: 1rem;">
            <strong>${escapeHtml(c.userName)} (${escapeHtml(c.userRole)})</strong> 
            <small>${new Date(c.createdAt).toLocaleString()}</small>
            <p>${escapeHtml(c.text)}</p>
            ${c.fileUrl ? `<p><a href="${escapeHtml(c.fileUrl)}" target="_blank">📎 Download attached file</a></p>` : ''}
            ${(c.userId === currentUserId || (currentUser && currentUser.role === 'admin')) 
              ? `<button onclick="deleteComment('${c._id}')" class="btn-outline" style="font-size:0.8rem;">Delete</button>` 
              : ''}
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('commentsList').innerHTML = `<p style="color:red;">Error loading discussion: ${err.message}</p>`;
      }
    }

    document.getElementById('postCommentBtn').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value;
      const fileInput = document.getElementById('commentFile');
      const file = fileInput.files[0];
      if (!text.trim() && !file) {
        alert('Please enter a comment or attach a file.');
        return;
      }
      const formData = new FormData();
      formData.append('questionId', questionId);
      if (text.trim()) formData.append('text', text);
      if (file) formData.append('file', file);
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${window.API_BASE}/comments`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        if (res.ok) {
          document.getElementById('commentText').value = '';
          fileInput.value = '';
          loadComments();
        } else {
          const data = await res.json();
          alert(data.error);
        }
      } catch (err) {
        alert(err.message);
      }
    });

    async function deleteComment(commentId) {
      if (confirm('Delete this comment?')) {
        try {
          await apiFetch(`/comments/${commentId}`, { method: 'DELETE' });
          loadComments();
        } catch (err) {
          alert(err.message);
        }
      }
    }

    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'login.html';
    });

    loadAnswerDetails();
  </script>
</body>
</html>
